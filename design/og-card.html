<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>og card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; background: #222222; overflow: hidden; }
  .card {
    width: 1200px; height: 630px;
    padding: 80px 90px 60px;
    display: flex; flex-direction: column;
    font-family: 'Montserrat', sans-serif;
  }
  .eyebrow {
    font: 600 16px/1.6 'Montserrat', sans-serif;
    text-transform: uppercase;
    letter-spacing: .22em;
    color: #D4AF37;
    margin-bottom: 30px;
  }
  h1 {
    font: 700 96px/1.1 'Playfair Display', Georgia, serif;
    letter-spacing: -0.01em;
    color: #FFFFFF;
    margin-bottom: 34px;
  }
  h1 em { font-style: italic; }
  .sub {
    font: 500 26px/1.5 'Montserrat', sans-serif;
    color: #F7F5EF;
    max-width: 30ch;
  }
  .rule { width: 84px; border-top: 2px solid #D4AF37; margin: 40px 0 0; }
  .bottom {
    margin-top: auto;
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .who { font: 500 18px/1.5 'Montserrat', sans-serif; color: #8A8A8A; max-width: 46ch; }
  .logo { height: 44px; }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">The ACA Scorecard</p>
  <h1>Find your <em>leak</em></h1>
  <p class="sub">Accountability. Consistency. Action. Fifteen questions, three minutes.</p>
  <div class="rule"></div>
  <div class="bottom">
    <p class="who">Built by Shea McAleese. 4x Olympian, 320+ international caps.</p>
    <img class="logo" src="../assets/elv8-white.png" alt="ELV8">
  </div>
</div>
</body>
</html>
